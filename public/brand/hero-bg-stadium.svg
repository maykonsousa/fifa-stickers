<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="sky" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#2d7d4f"></stop>
      <stop offset="40%" stop-color="#155236"></stop>
      <stop offset="100%" stop-color="#04140b"></stop>
    </radialGradient>
    <linearGradient id="pitch" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="transparent"></stop>
      <stop offset="100%" stop-color="#000" stop-opacity="0.5"></stop>
    </linearGradient>
    <pattern id="grass" width="60" height="60" patternUnits="userSpaceOnUse" patternTransform="skewX(-15)">
      <rect width="30" height="60" fill="#000" opacity="0.05"></rect>
    </pattern>
  </defs>
  <rect width="1920" height="1080" fill="url(#sky)"></rect>
  <g opacity="0.18"><ellipse cx="300" cy="-40" rx="240" ry="800" fill="#fef9e8"></ellipse></g>
  <g opacity="0.18"><ellipse cx="1620" cy="-40" rx="240" ry="800" fill="#fef9e8"></ellipse></g>
  <g transform="translate(0 600)">
    <polygon points="0,480 1920,480 1500,0 420,0" fill="#0d4a32"></polygon>
    <polygon points="0,480 1920,480 1500,0 420,0" fill="url(#grass)"></polygon>
    <ellipse cx="960" cy="240" rx="160" ry="38" fill="none" stroke="#fef9e8" stroke-width="2" opacity="0.5"></ellipse>
    <circle cx="960" cy="240" r="3" fill="#fef9e8" opacity="0.5"></circle>
    <line x1="420" y1="0" x2="0" y2="480" stroke="#fef9e8" stroke-width="2" opacity="0.4"></line>
    <line x1="1500" y1="0" x2="1920" y2="480" stroke="#fef9e8" stroke-width="2" opacity="0.4"></line>
  </g>
  <rect width="1920" height="1080" fill="url(#pitch)"></rect>
</svg>